version: 2

project_name: release-tools

builds:
  - id: release-tools
    main: ./cmd/release-tools
    binary: release-tools
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: toolkit
    ids:
      - release-tools
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: cmd/release-tools/*.go
      - src: bin/*
      - src: docs/*
      - src: examples/*
      - src: assets/brand/*
      - src: scripts/*
      - src: .release-tools.env
      - src: .goreleaser.yaml
      - src: .gitignore
      - src: AGENTS.md
      - src: CHANGELOG.md
      - src: Containerfile.dev
      - src: go.mod
      - src: LICENSE
      - src: NEWS.md
      - src: README.md

checksum:
  name_template: checksums.txt

gitea_urls:
  api: https://codeberg.org/api/v1
  download: https://codeberg.org

release:
  gitea:
    owner: rch
    name: release-tools
  mode: replace
