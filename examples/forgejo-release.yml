name: release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Goreleaser
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sfL https://raw.githubusercontent.com/goreleaser/goreleaser/main/scripts/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap release-tools
        run: ./scripts/bootstrap-release-tools.sh > .release-tools-path

      - name: Check release setup
        run: "$(cat .release-tools-path)/bin/release-tools" doctor

      - name: Publish release
        run: "$(cat .release-tools-path)/bin/release-tools" publish
