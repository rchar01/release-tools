name: release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
      RELEASE_TOOLS_INSTALL_VERSION: v2.2.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Goreleaser
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sfL https://raw.githubusercontent.com/goreleaser/goreleaser/main/scripts/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install release-tools
        run: |
          mkdir -p .tmp/bin
          version="${RELEASE_TOOLS_INSTALL_VERSION#v}"
          curl -fsSL -o .tmp/bin/release-tools \
            "https://codeberg.org/rch/release-tools/releases/download/${RELEASE_TOOLS_INSTALL_VERSION}/release-tools_${version}_linux_amd64"
          chmod +x .tmp/bin/release-tools
          echo "$PWD/.tmp/bin" >> "$GITHUB_PATH"

      - name: Check release setup
        run: release-tools doctor

      - name: Publish release
        run: release-tools publish
