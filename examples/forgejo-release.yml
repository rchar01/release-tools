name: release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Goreleaser
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sfL https://raw.githubusercontent.com/goreleaser/goreleaser/main/scripts/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: make test

      - name: Publish release
        run: make release
